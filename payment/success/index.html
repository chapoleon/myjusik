<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 완료 - MoneyFit</title>
  <meta name="description" content="결제가 완료되었습니다." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    :root{ --primary:#EA580C; --primary-dark:#C2410C; --primary-light:#FB923C; --text-1:#2D3436; }
    .center{min-height:70vh;display:flex;align-items:center;justify-content:center}
    .msg{font-weight:950;font-size:20px;margin-bottom:8px}
    .sub{color:var(--text-2);font-weight:700;line-height:1.55}
    .box{max-width:560px}
    .btn-orange{width:100%;padding:14px 18px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;font-size:15px;font-weight:950;display:flex;justify-content:center;align-items:center;gap:8px;margin-top:14px}
    .meta{margin-top:12px;font-size:12px;color:var(--text-3);font-weight:700}
  </style>
</head>
<body>
  <div class="container center">
    <div class="card box">
      <div class="msg">결제 완료!</div>
      <div class="sub">내일부터 매일 아침 종목 알림을 보내드립니다.</div>
      <a class="btn-orange" href="/index.html#result" style="text-decoration:none">
        결과 페이지로 이동 <i class="fas fa-arrow-right"></i>
      </a>
      <div class="meta" id="meta"></div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    // Toss returns query params (paymentKey/orderId/amount etc). We'll show a small confirmation.
    const qs = new URLSearchParams(location.search);
    const orderId = qs.get('orderId');
    const amount = qs.get('amount');
    const paymentKey = qs.get('paymentKey');
    const parts = [];
    if (orderId) parts.push('orderId: ' + orderId);
    if (amount) parts.push('amount: ' + amount);
    if (paymentKey) parts.push('paymentKey: ' + paymentKey);
    document.getElementById('meta').textContent = parts.length ? parts.join(' · ') : '';
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 실패 - MoneyFit</title>
  <meta name="description" content="결제가 실패했습니다." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    :root{ --primary:#EA580C; --primary-dark:#C2410C; --primary-light:#FB923C; --text-1:#2D3436; }
    .center{min-height:70vh;display:flex;align-items:center;justify-content:center}
    .msg{font-weight:950;font-size:20px;margin-bottom:8px}
    .sub{color:var(--text-2);font-weight:700;line-height:1.55}
    .box{max-width:560px}
    .btn-ghost{width:100%;padding:14px 18px;border-radius:16px;background:transparent;border:2px solid var(--border);color:var(--text-1);font-size:15px;font-weight:950;display:flex;justify-content:center;align-items:center;gap:8px;margin-top:14px}
    .meta{margin-top:12px;font-size:12px;color:var(--text-3);font-weight:700}
  </style>
</head>
<body>
  <div class="container center">
    <div class="card box">
      <div class="msg">결제 실패</div>
      <div class="sub">잠시 후 다시 시도해 주세요. 문제가 반복되면 문의하기로 연락 부탁드립니다.</div>
      <a class="btn-ghost" href="/pricing/" style="text-decoration:none">
        구독 페이지로 돌아가기 <i class="fas fa-rotate-left"></i>
      </a>
      <div class="meta" id="meta"></div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const qs = new URLSearchParams(location.search);
    const code = qs.get('code');
    const message = qs.get('message');
    document.getElementById('meta').textContent = [code, message].filter(Boolean).join(' · ');
  </script>
</body>
</html>
